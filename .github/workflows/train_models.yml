name: Train DQN Agent

on:
  schedule:
    - cron: "0 1 * * 2-6"    # 01:00 UTC = 8pm EST Mon-Fri (sweep auto-run)
    - cron: "0 0 * * 2-6"    # 00:00 UTC = 7pm EST Mon-Fri (wipe previous day's sweep cache)
  workflow_dispatch:
    inputs:
      start_year:
        description: "Training data start year (e.g. 2015)"
        required: false
        default: "2015"
      fee_bps:
        description: "Transaction fee in basis points"
        required: false
        default: "10"
      tsl_pct:
        description: "Trailing stop loss %"
        required: false
        default: "10"
      z_reentry:
        description: "Z-score re-entry threshold"
        required: false
        default: "1.1"
      sweep_mode:
        description: "Comma-separated sweep years e.g. 2008,2013,2015,2017,2019,2021 (blank = run all years)"
        required: false
        default: ""

jobs:
  # ── Midnight wipe — deletes previous day's sweep cache files ────────────────
  wipe_sweep_cache:
    if: >
      github.event_name == 'schedule' &&
      github.event.schedule == '0 0 * * 2-6'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete old sweep cache files
        run: |
          python3 - <<'EOF'
          import os, glob
          from datetime import datetime, timezone, timedelta
          today = (datetime.now(timezone.utc) - timedelta(hours=5)).strftime("%Y%m%d")
          deleted = 0
          for f in glob.glob("results/option_*/sweep_*.json"):
              if today not in f:
                  os.remove(f)
                  print(f"Deleted: {f}")
                  deleted += 1
          print(f"Wiped {deleted} stale sweep cache files")
          EOF
      - name: Commit wipe
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A results/
          git diff --cached --quiet || git commit -m "[auto] Wipe stale sweep cache $(date -u +%Y-%m-%d)"
          git push || true

  # ── Single-year train (manual or daily auto) ─────────────────────────────────
  # This runs when a specific year is requested (sweep_mode blank or not set)
  # It will run the train, evaluate, predict for that year and upload results.
  # The single-year job is kept for backward compatibility but not needed for full sweep.
  train:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 1 * * 2-6') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.sweep_mode == '' || github.event.inputs.sweep_mode == null))
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest data from HF Dataset
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: |
          python - <<'EOF'
          import os, shutil
          from huggingface_hub import hf_hub_download

          HF_TOKEN        = os.getenv("HF_TOKEN", "")
          HF_DATASET_REPO = os.getenv("HF_DATASET_REPO", "P2SAMAPA/P2-ETF-DQN-ENGINE-DATASET")

          os.makedirs("data", exist_ok=True)
          for f in ["etf_prices", "macro"]:
              try:
                  path = hf_hub_download(
                      repo_id=HF_DATASET_REPO,
                      filename=f"data/{f}.parquet",
                      repo_type="dataset",
                      token=HF_TOKEN,
                  )
                  shutil.copy(path, f"data/{f}.parquet")
                  print(f"  ✓ data/{f}.parquet")
              except Exception as e:
                  print(f"  Warning: {f}: {e}")
          EOF

      - name: Incremental data update (catch up to today)
        env:
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: python data_download.py --mode incremental

      - name: Smoke test (fast pre-flight checks — fails fast before wasting training time)
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: python smoke_test.py

      - name: Train Dueling DQN Agent (Option A)
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: |
          START_YEAR="${{ github.event.inputs.start_year }}"
          START_YEAR="${START_YEAR:-2015}"
          if [ "$START_YEAR" -le 2010 ]; then EPISODES=150
          elif [ "$START_YEAR" -le 2013 ]; then EPISODES=200
          elif [ "$START_YEAR" -le 2015 ]; then EPISODES=220
          elif [ "$START_YEAR" -le 2017 ]; then EPISODES=250
          elif [ "$START_YEAR" -le 2019 ]; then EPISODES=280
          else EPISODES=300
          fi
          python train.py --option a \
            --start_year "$START_YEAR" \
            --episodes   "$EPISODES" \
            --fee_bps    "${{ github.event.inputs.fee_bps || '10' }}"

      - name: Run evaluation (Option A)
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: |
          START_YEAR="${{ github.event.inputs.start_year }}"
          START_YEAR="${START_YEAR:-2015}"
          python evaluate.py --option a \
            --start_year "$START_YEAR" \
            --fee_bps    "${{ github.event.inputs.fee_bps || '10' }}" \
            --tsl        "${{ github.event.inputs.tsl_pct || '10' }}" \
            --z          "${{ github.event.inputs.z_reentry || '1.1' }}"

      - name: Run prediction (Option A)
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: |
          python predict.py --option a \
            --tsl "${{ github.event.inputs.tsl_pct   || '10'  }}" \
            --z   "${{ github.event.inputs.z_reentry  || '1.1' }}"

      - name: Push weights + results to HF Dataset (Option A)
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python - <<'EOF'
          import os, glob
          from huggingface_hub import HfApi, CommitOperationAdd

          HF_TOKEN        = os.getenv("HF_TOKEN", "")
          HF_DATASET_REPO = os.getenv("HF_DATASET_REPO", "P2SAMAPA/P2-ETF-DQN-ENGINE-DATASET")

          api  = HfApi(token=HF_TOKEN)
          ops  = []

          for f in glob.glob("data/*.parquet"):
              ops.append(CommitOperationAdd(
                  path_in_repo=f"data/{os.path.basename(f)}",
                  path_or_fileobj=f))

          # Option A model files
          for f in glob.glob("models/dqn_best.pt") + glob.glob("models/training_summary.json"):
              if os.path.exists(f):
                  ops.append(CommitOperationAdd(path_in_repo=f"models/option_a/{os.path.basename(f)}", path_or_fileobj=f))

          # Option A result jsons
          for f in ["evaluation_results_a.json", "latest_prediction_a.json"]:
              if os.path.exists(f):
                  ops.append(CommitOperationAdd(path_in_repo=f"results/option_a/{f}", path_or_fileobj=f))

          if ops:
              api.create_commit(
                  repo_id=HF_DATASET_REPO,
                  repo_type="dataset",
                  operations=ops,
                  commit_message=f"[auto] DQN weights + data — option a start_year=${{ github.event.inputs.start_year }}",
              )
              print(f"Pushed {len(ops)} files to HF Dataset")
          EOF

      - name: Commit results to GitHub (Option A)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evaluation_results_a.json latest_prediction_a.json \
                  models/training_summary.json results/ 2>/dev/null || true
          git diff --cached --quiet || \
            git commit -m "[auto] DQN results (a) — start_year=${{ github.event.inputs.start_year }} $(date -u +%Y-%m-%d)"
          git push || true

      - name: Train Dueling DQN Agent (Option B)
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: |
          START_YEAR="${{ github.event.inputs.start_year }}"
          START_YEAR="${START_YEAR:-2015}"
          if [ "$START_YEAR" -le 2010 ]; then EPISODES=150
          elif [ "$START_YEAR" -le 2013 ]; then EPISODES=200
          elif [ "$START_YEAR" -le 2015 ]; then EPISODES=220
          elif [ "$START_YEAR" -le 2017 ]; then EPISODES=250
          elif [ "$START_YEAR" -le 2019 ]; then EPISODES=280
          else EPISODES=300
          fi
          python train.py --option b \
            --start_year "$START_YEAR" \
            --episodes   "$EPISODES" \
            --fee_bps    "${{ github.event.inputs.fee_bps || '10' }}"

      - name: Run evaluation (Option B)
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: |
          START_YEAR="${{ github.event.inputs.start_year }}"
          START_YEAR="${START_YEAR:-2015}"
          python evaluate.py --option b \
            --start_year "$START_YEAR" \
            --fee_bps    "${{ github.event.inputs.fee_bps || '10' }}" \
            --tsl        "${{ github.event.inputs.tsl_pct || '10' }}" \
            --z          "${{ github.event.inputs.z_reentry || '1.1' }}"

      - name: Run prediction (Option B)
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: |
          python predict.py --option b \
            --tsl "${{ github.event.inputs.tsl_pct   || '10'  }}" \
            --z   "${{ github.event.inputs.z_reentry  || '1.1' }}"

      - name: Push weights + results to HF Dataset (Option B)
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python - <<'EOF'
          import os, glob
          from huggingface_hub import HfApi, CommitOperationAdd

          HF_TOKEN        = os.getenv("HF_TOKEN", "")
          HF_DATASET_REPO = os.getenv("HF_DATASET_REPO", "P2SAMAPA/P2-ETF-DQN-ENGINE-DATASET")

          api  = HfApi(token=HF_TOKEN)
          ops  = []

          for f in glob.glob("data/*.parquet"):
              ops.append(CommitOperationAdd(
                  path_in_repo=f"data/{os.path.basename(f)}",
                  path_or_fileobj=f))

          # Option B model files
          for f in glob.glob("models/option_b/dqn_best.pt") + glob.glob("models/option_b/training_summary.json"):
              if os.path.exists(f):
                  ops.append(CommitOperationAdd(path_in_repo=f"models/option_b/{os.path.basename(f)}", path_or_fileobj=f))

          # Option B result jsons
          for f in ["evaluation_results_b.json", "latest_prediction_b.json"]:
              if os.path.exists(f):
                  ops.append(CommitOperationAdd(path_in_repo=f"results/option_b/{f}", path_or_fileobj=f))

          if ops:
              api.create_commit(
                  repo_id=HF_DATASET_REPO,
                  repo_type="dataset",
                  operations=ops,
                  commit_message=f"[auto] DQN weights + data — option b start_year=${{ github.event.inputs.start_year }}",
              )
              print(f"Pushed {len(ops)} files to HF Dataset")
          EOF

      - name: Commit results to GitHub (Option B)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evaluation_results_b.json latest_prediction_b.json \
                  models/training_summary.json results/ 2>/dev/null || true
          git diff --cached --quiet || \
            git commit -m "[auto] DQN results (b) — start_year=${{ github.event.inputs.start_year }} $(date -u +%Y-%m-%d)"
          git push || true

      - name: Done
        run: echo "✅ DQN training pipeline complete for both options."

  # ── Sweep job template (one per year, all run in parallel) ──────────────────
  # This runs when sweep_mode is provided (comma-separated years) OR when
  # sweep_mode is blank (run all years). This ensures a manual dispatch with
  # empty sweep_mode will generate results for all years.
  sweep:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 1 * * 2-6') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        year: [2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
        option: [a, b]
    env:
      HF_TOKEN:        ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python smoke_test.py
      - run: python data_download.py --mode incremental
      - name: Set episodes
        run: |
          YEAR=${{ matrix.year }}
          if [ "$YEAR" -le 2010 ]; then EPISODES=150
          elif [ "$YEAR" -le 2013 ]; then EPISODES=200
          elif [ "$YEAR" -le 2015 ]; then EPISODES=220
          elif [ "$YEAR" -le 2017 ]; then EPISODES=250
          elif [ "$YEAR" -le 2019 ]; then EPISODES=280
          else EPISODES=300
          fi
          echo "EPISODES=$EPISODES" >> $GITHUB_ENV
      - name: Train for year ${{ matrix.year }} (option ${{ matrix.option }})
        run: python train.py --option ${{ matrix.option }} --start_year ${{ matrix.year }} --episodes $EPISODES --fee_bps 10
      - name: Evaluate for year ${{ matrix.year }} (option ${{ matrix.option }})
        run: python evaluate.py --option ${{ matrix.option }} --start_year ${{ matrix.year }} --fee_bps 10 --tsl 10 --z 1.1
      - name: Predict for year ${{ matrix.year }} (option ${{ matrix.option }})
        run: python predict.py --option ${{ matrix.option }} --tsl 10 --z 1.1
      - name: Push sweep result to HF Dataset
        run: |
          python3 - <<'EOF'
          import os, json, glob
          from huggingface_hub import HfApi, CommitOperationAdd
          token   = os.environ["HF_TOKEN"]
          repo_id = os.environ.get("HF_DATASET_REPO", "P2SAMAPA/P2-ETF-DQN-ENGINE-DATASET")
          option  = "${{ matrix.option }}"
          year    = "${{ matrix.year }}"
          api     = HfApi()
          ops     = []
          for f in glob.glob(f"results/option_{option}/sweep_{year}_*.json"):
              fname = os.path.basename(f)
              with open(f, "rb") as fh:
                  ops.append(CommitOperationAdd(path_in_repo=f"sweep/option_{option}/{fname}", path_or_fileobj=fh.read()))
          if ops:
              api.create_commit(repo_id=repo_id, repo_type="dataset", token=token,
                                operations=ops, commit_message=f"Sweep results: {option}/{year}")
              print(f"Pushed {len(ops)} sweep file(s) to HF Dataset")
          EOF
      - name: Commit sweep results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add results/ evaluation_results_${{ matrix.option }}.json latest_prediction_${{ matrix.option }}.json models/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "[auto] Sweep ${{ matrix.year }} ${{ matrix.option }} $(date -u +%Y-%m-%d)"
          git push || true
