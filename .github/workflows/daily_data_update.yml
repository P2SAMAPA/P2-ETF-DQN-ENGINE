name: Daily Data Update

on:
  schedule:
    - cron: "0 2 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run incremental data update
        env:
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: python data_download.py --mode incremental

      - name: Push updated data to HF Dataset
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python - <<'EOF'
          import os, glob
          from huggingface_hub import HfApi, CommitOperationAdd

          HF_TOKEN        = os.getenv("HF_TOKEN", "")
          HF_DATASET_REPO = os.getenv("HF_DATASET_REPO", "P2SAMAPA/P2-ETF-DQN-ENGINE-DATASET")

          api   = HfApi(token=HF_TOKEN)
          files = glob.glob("data/*.parquet")
          ops   = [CommitOperationAdd(
                      path_in_repo=f"data/{os.path.basename(f)}",
                      path_or_fileobj=f)
                   for f in files if os.path.exists(f)]
          if ops:
              api.create_commit(
                  repo_id=HF_DATASET_REPO,
                  repo_type="dataset",
                  operations=ops,
                  commit_message=f"[auto] Daily data update",
              )
              print(f"Pushed {len(ops)} parquet file(s) to HF Dataset")
          EOF

      - name: Run prediction with latest weights
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: python predict.py

      - name: Push prediction to HF Space
        env:
          HF_TOKEN:      ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi, CommitOperationAdd

          HF_TOKEN      = os.getenv("HF_TOKEN", "")
          HF_SPACE_REPO = os.getenv("HF_SPACE_REPO", "P2SAMAPA/P2-ETF-DQN-ENGINE")

          api = HfApi(token=HF_TOKEN)
          ops = []
          if os.path.exists("latest_prediction.json"):
              ops.append(CommitOperationAdd(
                  path_in_repo="latest_prediction.json",
                  path_or_fileobj="latest_prediction.json"))
          if ops:
              api.create_commit(
                  repo_id=HF_SPACE_REPO,
                  repo_type="space",
                  operations=ops,
                  commit_message="[auto] Daily prediction update",
              )
          EOF

      - name: Commit prediction to GitHub
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_prediction.json || true
          git diff --cached --quiet || \
            git commit -m "[auto] Daily prediction $(date -u +%Y-%m-%d)"
          git push || true
