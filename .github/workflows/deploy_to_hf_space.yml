name: Deploy to HF Space

on:
  workflow_dispatch:  # Manual trigger only
  
  push:
    branches:
      - main         # Auto-deploy when code is pushed to main
    paths:
      - 'app.py'
      - 'config.py'
      - 'features.py'
      - 'env.py'
      - 'agent.py'
      - 'train.py'
      - 'evaluate.py'
      - 'predict.py'
      - 'data_download.py'
      - 'requirements.txt'
      - 'evaluation_results.json'
      - 'latest_prediction.json'
      - 'models/training_summary.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest data from HF Dataset
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python - <<'EOF'
          import os, shutil
          from huggingface_hub import hf_hub_download

          HF_TOKEN        = os.getenv("HF_TOKEN", "")
          HF_DATASET_REPO = os.getenv("HF_DATASET_REPO", "P2SAMAPA/P2-ETF-DQN-ENGINE-DATASET")

          os.makedirs("data", exist_ok=True)
          os.makedirs("models", exist_ok=True)
          
          for f in ["etf_prices", "macro"]:
              try:
                  path = hf_hub_download(
                      repo_id=HF_DATASET_REPO,
                      filename=f"data/{f}.parquet",
                      repo_type="dataset",
                      token=HF_TOKEN,
                  )
                  shutil.copy(path, f"data/{f}.parquet")
                  print(f"  ✓ data/{f}.parquet")
              except Exception as e:
                  print(f"  Warning: {f}: {e}")
          
          # Download model weights if they exist
          for f in ["dqn_best.pt", "training_summary.json"]:
              try:
                  path = hf_hub_download(
                      repo_id=HF_DATASET_REPO,
                      filename=f"models/{f}",
                      repo_type="dataset",
                      token=HF_TOKEN,
                  )
                  shutil.copy(path, f"models/{f}")
                  print(f"  ✓ models/{f}")
              except Exception as e:
                  print(f"  Warning: models/{f}: {e}")
          EOF

      - name: Push code + results to HF Space
        env:
          HF_TOKEN:      ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi, CommitOperationAdd

          HF_TOKEN      = os.getenv("HF_TOKEN", "")
          HF_SPACE_REPO = os.getenv("HF_SPACE_REPO", "P2SAMAPA/P2-ETF-DQN-ENGINE")

          api = HfApi(token=HF_TOKEN)
          
          space_files = [
              "app.py", "config.py", "features.py", "env.py",
              "agent.py", "train.py", "evaluate.py", "predict.py",
              "data_download.py", "requirements.txt",
          ]
          
          # Optional result files (only if they exist)
          optional_files = [
              "evaluation_results.json",
              "latest_prediction.json",
              "models/training_summary.json",
              "models/dqn_best.pt",
          ]
          
          ops = []
          
          # Add core files
          for f in space_files:
              if os.path.exists(f):
                  ops.append(CommitOperationAdd(path_in_repo=f, path_or_fileobj=f))
                  print(f"Adding: {f}")
              else:
                  print(f"Missing core file: {f}")
          
          # Add optional files if they exist
          for f in optional_files:
              if os.path.exists(f):
                  ops.append(CommitOperationAdd(path_in_repo=f, path_or_fileobj=f))
                  print(f"Adding: {f}")
              else:
                  print(f"Skipping optional: {f}")
          
          if ops:
              api.create_commit(
                  repo_id=HF_SPACE_REPO,
                  repo_type="space",
                  operations=ops,
                  commit_message="[auto] Deploy to HF Space from GitHub",
              )
              print(f"✅ Pushed {len(ops)} files to HF Space")
          else:
              print("❌ No files to push!")
              exit(1)
          EOF

      - name: Done
        run: echo "✅ HF Space deployment complete"
