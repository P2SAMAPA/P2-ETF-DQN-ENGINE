name: Walk‑Forward All Years

on:
  schedule:
    - cron: "0 2 * * 2-6"    # daily at 2am UTC (after market close)
  workflow_dispatch:

jobs:
  walkforward-a:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        year: [2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
    env:
      HF_TOKEN:        ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Download data from HF
        run: |
          python - <<'EOF'
          import os, shutil
          from huggingface_hub import hf_hub_download
          os.makedirs("data", exist_ok=True)
          for f in ["etf_prices", "macro"]:
              try:
                  path = hf_hub_download(repo_id=os.getenv("HF_DATASET_REPO"), filename=f"data/{f}.parquet", repo_type="dataset", token=os.getenv("HF_TOKEN"))
                  shutil.copy(path, f"data/{f}.parquet")
              except Exception as e:
                  print(f"Warning: {f} - {e}")
          EOF
      - run: python data_download.py --mode incremental
      - run: python smoke_test.py
      - name: Run walk‑forward for year ${{ matrix.year }}
        run: python evaluate.py --option a --start_year ${{ matrix.year }} --walkforward-all
      - name: Upload results to HF
        run: |
          python - <<'EOF'
          import os, glob
          from huggingface_hub import HfApi, CommitOperationAdd
          token = os.getenv("HF_TOKEN")
          repo_id = os.getenv("HF_DATASET_REPO")
          api = HfApi()
          ops = []
          today = __import__('datetime').datetime.now().strftime("%Y%m%d")
          for f in glob.glob(f"results/option_a/walkforward/sweep_{today}.json"):
              with open(f, "rb") as fh:
                  ops.append(CommitOperationAdd(path_in_repo=f"results/option_a/walkforward/sweep_{today}.json", path_or_fileobj=fh.read()))
          if ops:
              api.create_commit(repo_id=repo_id, repo_type="dataset", token=token, operations=ops, commit_message=f"Walkforward results {today}")
              print("Uploaded walkforward results")
          EOF

  walkforward-b:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        year: [2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
    env:
      HF_TOKEN:        ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Download data from HF
        run: |
          python - <<'EOF'
          import os, shutil
          from huggingface_hub import hf_hub_download
          os.makedirs("data", exist_ok=True)
          for f in ["etf_prices", "macro"]:
              try:
                  path = hf_hub_download(repo_id=os.getenv("HF_DATASET_REPO"), filename=f"data/{f}.parquet", repo_type="dataset", token=os.getenv("HF_TOKEN"))
                  shutil.copy(path, f"data/{f}.parquet")
              except Exception as e:
                  print(f"Warning: {f} - {e}")
          EOF
      - run: python data_download.py --mode incremental
      - run: python smoke_test.py
      - name: Run walk‑forward for year ${{ matrix.year }}
        run: python evaluate.py --option b --start_year ${{ matrix.year }} --walkforward-all
      - name: Upload results to HF
        run: |
          python - <<'EOF'
          import os, glob
          from huggingface_hub import HfApi, CommitOperationAdd
          token = os.getenv("HF_TOKEN")
          repo_id = os.getenv("HF_DATASET_REPO")
          api = HfApi()
          ops = []
          today = __import__('datetime').datetime.now().strftime("%Y%m%d")
          for f in glob.glob(f"results/option_b/walkforward/sweep_{today}.json"):
              with open(f, "rb") as fh:
                  ops.append(CommitOperationAdd(path_in_repo=f"results/option_b/walkforward/sweep_{today}.json", path_or_fileobj=fh.read()))
          if ops:
              api.create_commit(repo_id=repo_id, repo_type="dataset", token=token, operations=ops, commit_message=f"Walkforward results {today}")
              print("Uploaded walkforward results")
          EOF
